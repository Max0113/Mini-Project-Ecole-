<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Drive</title>
    <link rel="icon" type="image/x-icon" href="../../Source/Background.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/Components_Globale/StyleNP.css">
    <link rel="stylesheet" href="/Components_Globale/FooterShort.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="page">
    <header id="header">
            
    </header>
    <div id="smooth-wrapper">
        <div id="smooth-content">
        <div class="page-shell">
            <main class="page-content">
                <div class="cars-layout">
                    <aside class="filters">
                        <div class="filter-block">
                            <div class="filter-title">Category</div>
                            <div class="filter-options">
                                <label class="filter-option">
                                    <input type="checkbox" class="filter-checkbox is-accent" name="checkbox"/>
                                    <span class="filter-label">All Cars</span>
                                </label>
                                <label class="filter-option">
                                    <input type="checkbox" class="filter-checkbox" name="checkbox"/>
                                    <span class="filter-label">Luxury</span>
                                </label>
                                <label class="filter-option">
                                    <input type="checkbox" class="filter-checkbox" name="checkbox"/>
                                    <span class="filter-label">SUV</span>
                                </label>
                                <label class="filter-option">
                                    <input type="checkbox" class="filter-checkbox" name="checkbox"/>
                                    <span class="filter-label">Electric</span>
                                </label>
                                <label class="filter-option">
                                    <input type="checkbox" class="filter-checkbox" name="checkbox"/>
                                    <span class="filter-label">Sport</span>
                                </label>
                            </div>

                            <div class="select-wrapper">
                                <select class="select-input">
                                    <option value="popularity">Popularity</option>
                                    <option value="newest">Newest</option>
                                    <option value="price-low">Price: Low to High</option>
                                    <option value="price-high">Price: High to Low</option>
                                </select>
                                <div class="select-icon">
                                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                                        <path d="M3 5L7 9L11 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </div>
                            </div>

                        </div>

                        <div class="filter-block">
                            <div class="filter-title">Price Range</div>
                            <input type="range" />
                            <div class="range-meta">
                                <span>$50/day</span>
                                <span>$500/day</span>
                            </div>
                        </div>

                        <div class="filter-block">
                            <div class="filter-title">Transmission</div>
                            <div class="pill-group">
                                <button class="pill is-active">Automatic</button>
                                <button class="pill">Manual</button>
                            </div>
                        </div>

                        <div class="promo-card">
                            <div class="promo-tag">Promo</div>
                            <div class="promo-title">Get 20% off on your<br />first rental</div>
                            <button class="promo-cta">Claim Now</button>
                        </div>
                    </aside>

                    <section class="results">
                        <div class="results-toolbar">
                            <div>
                                <h2 class="results-title">Available Fleet</h2>
                                <p class="results-subtitle">Showing 128 results for your selection</p>
                            </div>
                            <div class="search-box">
                                <i class="fa-solid fa-magnifying-glass"></i>
                                <input class="search-input" placeholder="Search for cars..." />
                            </div>
                        </div>

                        <div id="CarGrid" class="car-grid">
                            <!-- Cards -->
                        </div>
                    </section>
                </div>
            </main>


            <footer id="footer">
                
            </footer>
        </div>
    </div>
</div>

    

    <script type="module" src="./script.js"></script>
    <script type="module" src="/Components_Globale/NabarScript.js"></script>

    <!-- GSAP -->

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollSmoother.min.js"></script>
</body>
</html>
