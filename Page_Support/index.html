<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Drive | Support</title>
    <link rel="icon" type="image/x-icon" href="../Source/Logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/Components_Globale/Navbar/StyleNP.css">
    <link rel="stylesheet" href="/Components_Globale/Footer/Footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <script type="text/javascript">
        (function(){
            emailjs.init({
                publicKey: "hhOCSYuYsUek6VGGA",
            });
        })();
    </script>
</head>
<body class="page">
    <header id="header">

    </header>
    <div id="smooth-wrapper">
		<div id="smooth-content">
    <div class="page-shell">
        

        <main class="page-content">
            <section class="support-hero">
                <img id="supportHero" alt="Atlas Drive support" class="support-hero-image">
                <div class="support-hero-overlay"></div>
                <div class="support-hero-content">
                    <h2 class="support-hero-title">Get in Touch</h2>
                    <p class="support-hero-text">Whether you have a question about our fleet, pricing, or specialized services, our team is ready to assist you 24/7.</p>
                </div>
            </section>

            <section class="support-grid">
                <div class="support-left">
                    <h3 class="section-title">Contact Information</h3>
                    <div id="contactCards" class="contact-cards"></div>

                    <h3 class="section-title section-title--small">Find Us</h3>
                    <div class="map-card">
                        <iframe
                            title="Atlas Drive headquarters"
                            class="map-frame"
                            src="https://www.openstreetmap.org/export/embed.html?bbox=-9.627542495727539%2C30.376947891549637%2C-9.517850875854494%2C30.42839742921625&amp;layer=mapnik&amp;marker=30.402676048904883%2C-9.572696685791016"
                            loading="lazy"
                        ></iframe>
                        <div class="map-chip">
                            <i class="fa-solid fa-location-dot"></i>
                            <span>Atlas Drive Headquarters</span>
                        </div>
                    </div>
                </div>

                <aside class="support-right">
                    <div class="form-card">
                        <div class="form-card-header">
                            <h3 class="section-title">Send us a Message</h3>
                            <p class="section-subtitle">Fill out the form below and our team will get back to you shortly.</p>
                        </div>
                        <form class="support-form">
                            <label class="form-field form-field--half">
                                <span class="field-label">First Name *</span>
                                <input id="form_name" type="text" name="firstName" class="field-input" placeholder="John" required/>
                            </label>
                            <label class="form-field form-field--half">
                                <span class="field-label">Last Name</span>
                                <input type="text" name="lastName" class="field-input" placeholder="Doe" />
                            </label>
                            <label class="form-field form-field--full">
                                <span class="field-label">Email Address *</span>
                                <input id="form_email" type="email" name="email" class="field-input" placeholder="john@example.com" required/>
                            </label>
                            <label class="form-field form-field--full">
                                <span class="field-label">Inquiry Type</span>
                                <div class="select-wrapper">
                                    <select id="form_inquiry" name="inquiryType" class="field-input">
                                        <option value="general">General Inquiry</option>
                                        <option value="booking">Bookings & Pricing</option>
                                        <option value="corporate">Corporate Accounts</option>
                                        <option value="partnerships">Partnerships</option>
                                    </select>
                                    <i class="fa-solid fa-chevron-down select-icon"></i>
                                </div>
                            </label>
                            <label class="form-field form-field--full">
                                <span class="field-label">Message *</span>
                                <textarea id="form_message" name="message" class="field-input field-textarea" placeholder="How can we help you?" rows="4" required></textarea>
                            </label>
                            <button type="submit" class="btn-primary--outline" id="Send">Send Message <i class="fa-solid fa-arrow-right"></i></button>
                        </form>
                    </div>
                </aside>
            </section>
        </main>

        <footer id="footer"></footer>
    </div>
    </div>
	</div>

    <script type="module" src="./script.js"></script>
    <script type="module" src="/Components_Globale/Navbar/NabarScript.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollSmoother.min.js"></script>
</body>
</html>
