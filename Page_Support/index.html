<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Drive | Support</title>
    <link rel="icon" type="image/x-icon" href="../Source/Background.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/Components_Globale/StyleNP.css">
    <link rel="stylesheet" href="/Components_Globale/Footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="page">
    <div class="page-shell">
        <header id="header"></header>

        <main class="page-content">
            <section class="support-hero">
                <img id="supportHero" alt="Atlas Drive support" class="support-hero-image">
                <div class="support-hero-overlay"></div>
                <div class="support-hero-content">
                    <h2 class="support-hero-title">Get in Touch</h2>
                    <p class="support-hero-text">Whether you have a question about our fleet, pricing, or specialized services, our team is ready to assist you 24/7.</p>
                </div>
            </section>

            <section class="support-grid">
                <div class="support-left">
                    <h3 class="section-title">Contact Information</h3>
                    <div id="contactCards" class="contact-cards"></div>

                    <h3 class="section-title section-title--small">Find Us</h3>
                    <div class="map-card">
                        <iframe
                            title="Atlas Drive headquarters"
                            class="map-frame"
                            src="https://www.openstreetmap.org/export/embed.html?bbox=-122.513%2C37.703%2C-122.357%2C37.815&layer=mapnik&marker=37.7749%2C-122.4194"
                            loading="lazy"
                        ></iframe>
                        <div class="map-chip">
                            <i class="fa-solid fa-location-dot"></i>
                            <span>Atlas Drive Headquarters</span>
                        </div>
                    </div>
                </div>

                <aside class="support-right">
                    <div class="form-card">
                        <div class="form-card-header">
                            <h3 class="section-title">Send us a Message</h3>
                            <p class="section-subtitle">Fill out the form below and our team will get back to you shortly.</p>
                        </div>
                        <form class="support-form">
                            <div id="formFields" class="form-grid"></div>
                            <button type="submit" class="btn-primary--outline">Send Message <i class="fa-solid fa-arrow-right"></i></button>
                        </form>
                    </div>
                </aside>
            </section>
        </main>

        <footer id="footer"></footer>
    </div>

    <script type="module" src="./script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollSmoother.min.js"></script>
</body>
</html>
