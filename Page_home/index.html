<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Drive</title>
    <link rel="icon" type="image/x-icon" href="../Source/Background.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/Components_Globale/StyleNP.css">
    <link rel="stylesheet" href="/Components_Globale/Footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div id="smooth-wrapper">
		<div id="smooth-content">
            <header id="header">
                <!-- Navbar -->
            </header>

            <section class="hero">
                <div class="hero-content">
                    <h1 class="hero-title">
                        Drive Your Journey with <br /> Confidence
                    </h1>
                    <p class="hero-subtitle">
                        Affordable, reliable, and fast car rental service for your next adventure or <br /> business trip.
                    </p>
                    <div class="hero-actions">
                        <button class="btn btn-hero btn-primary">Book Now</button>
                        <button class="btn btn-hero btn-ghost">Explore Cars</button>
                    </div>
                </div>
                <div class="hero-visual"></div>
            </section>

            <section class="section section-featured">
                <h1 class="section-title section-title--spaced">Featured Cars</h1>
                <div class="section-heading">
                    <p class="section-subtitle">Choose from our top-rated selection of vehicles.</p>
                    <a class="section-link">View All <i class="fa-solid fa-arrow-right"></i></a>
                </div>
                <div id="CardFeatured" class="card-row featured-cards">
                    <!-- CardFeatured Voir Scripts.js -->
                </div>
            </section>

            <section class="section section-services">
                <h1 class="section-title section-title--center section-title--section">Why Choose Us</h1>
                <div id="CardServices" class="card-row services-cards">
                    <!-- CardServices Voir Scripts.js -->
                </div>
            </section>

            <section class="section section-how">
                <div class="section-intro">
                    <h1 class="section-title section-title--center">How It Works</h1>
                    <p class="section-subtitle section-subtitle--light">Three simple steps to start your journey.</p>
                </div>
                <div id="CardHowUse" class="card-row how-cards">
                    <!-- CardServices Voir Scripts.js -->
                
                </div>
            </section>

            <section class="section section-testimonials">
                <div class="section-intro section-intro--tight">
                    <h1 class="section-title section-title--center section-title--light">What Our Customers Say</h1>
                </div>
                <div id="CardTestimonials" class="card-row testimonials-cards">
                    <!-- CardTestimonials Voir Scripts.js -->
                </div>
            </section>

            <footer id="footer">
                
            </footer>
        </div>
    </div>




    <!-- Scripts -->

    <script type="module" src="./scripts.js"></script>

    <!-- GSAP -->

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollSmoother.min.js"></script>
</body>
</html>
